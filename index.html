<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breuken Werkbladgenerator – meesterdanny.com</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #dce4f0; }

        header { background: linear-gradient(135deg,#1558bb,#2c88f5); color:white; padding:13px 22px; display:flex; align-items:center; gap:11px; box-shadow:0 3px 10px rgba(0,0,0,.18); }
        header h1 { font-size:1.25rem; font-weight:800; }
        header p  { font-size:.75rem; opacity:.85; margin-top:1px; }

        .app { display:grid; grid-template-columns:265px 1fr; gap:18px; padding:18px; }
        .sidebar { display:flex; flex-direction:column; gap:11px; }
        .card { background:white; border-radius:12px; padding:14px 16px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
        .card-title { font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#1558bb; margin-bottom:11px; padding-bottom:6px; border-bottom:2px solid #e6eefa; }
        .fg { margin-bottom:9px; }
        .fg:last-child { margin-bottom:0; }
        .fg label { display:block; font-size:.75rem; font-weight:600; color:#555; margin-bottom:3px; }
        .fg select, .fg input[type=text] { width:100%; padding:6px 9px; border:1.5px solid #dde3ee; border-radius:7px; font-size:.82rem; background:#fafbfd; color:#333; }
        .fg select:focus, .fg input:focus { outline:none; border-color:#2c88f5; }

        .btn { width:100%; padding:10px; border:none; border-radius:9px; font-size:.88rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:7px; transition:filter .15s; }
        .btn:last-child { margin-bottom:0; }
        .btn:hover { filter:brightness(1.08); }
        .btn-gen { background:linear-gradient(135deg,#1558bb,#2c88f5); color:white; box-shadow:0 3px 10px rgba(44,136,245,.3); }
        .btn-prt { background:linear-gradient(135deg,#187a3e,#22c55e); color:white; box-shadow:0 3px 10px rgba(34,197,94,.25); }

        .pages-wrap { display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }
        .page-col { display:flex; flex-direction:column; gap:5px; }
        .page-label { font-size:.7rem; font-weight:700; color:#7a8faa; text-transform:uppercase; letter-spacing:1px; text-align:center; }

        .a4-page { background:white; border-radius:3px; box-shadow:0 4px 22px rgba(0,0,0,.13); aspect-ratio:210/297; overflow:hidden; padding:3.4% 5.7%; display:flex; flex-direction:column; }

        .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#c0cfe0; text-align:center; gap:8px; font-size:.85rem; line-height:1.5; }
        .empty .ico { font-size:2.8rem; }

        .ws { display:flex; flex-direction:column; height:100%; }
        .ws-head { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #111; padding-bottom:4px; margin-bottom:6px; flex-shrink:0; gap:6px; }
        .ws-head-left { display:flex; align-items:center; gap:7px; min-width:0; }
        .ws-logo  { height:36px; width:auto; flex-shrink:0; }
        .ws-title { font-size:clamp(.78rem,1.75vw,1.05rem); font-weight:900; color:#111; line-height:1.1; }
        .ws-sub   { font-size:clamp(.46rem,.88vw,.6rem); color:#999; margin-top:2px; }
        .ws-meta  { text-align:right; font-size:clamp(.5rem,.88vw,.63rem); color:#555; line-height:1.85; flex-shrink:0; }
        .ws-line  { display:inline-block; border-bottom:1px solid #555; min-width:70px; }

        .ans-badge { display:block; background:#fffbeb; border:1px solid #f0c000; color:#705000; border-radius:4px; padding:2px 7px; font-size:clamp(.46rem,.8vw,.58rem); font-weight:700; margin-bottom:5px; flex-shrink:0; }
        .ws-hint { font-size:clamp(.48rem,.9vw,.62rem); color:#444; background:#f2f6ff; border-left:3px solid #2c88f5; border-radius:3px; padding:3px 7px; margin-bottom:5px; flex-shrink:0; }

        /* Twee kolommen, genummerd van boven naar beneden */
        .ex-cols { display:grid; grid-template-columns:1fr 1fr; gap:0 clamp(6px,1.2vw,12px); flex:1; }
        .ex-col  { display:flex; flex-direction:column; gap:clamp(4px,.65vw,6px); }

        .ex-box { border:1px solid #dde3ee; border-radius:5px; padding:clamp(5px,.8vw,8px) clamp(5px,.9vw,8px) clamp(5px,.8vw,8px) 21px; position:relative; display:flex; align-items:center; min-height:clamp(32px,4.2vw,42px); flex:1; }
        .ex-n { position:absolute; top:50%; left:4px; transform:translateY(-50%); background:#2c88f5; color:white; border-radius:50%; width:13px; height:13px; font-size:.48rem; font-weight:800; display:flex; align-items:center; justify-content:center; }

        .ex-content { display:flex; align-items:center; flex-wrap:wrap; gap:2px 4px; font-size:clamp(.62rem,1.18vw,.76rem); width:100%; }

        .frac { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; font-weight:700; line-height:1; font-size:inherit; }
        .frac .t { border-bottom:1.5px solid #111; padding:0 2px; text-align:center; }
        .frac .b { padding:0 2px; text-align:center; }

        /* Gemengd getal: 1 3/10 */
        .mix { display:inline-flex; align-items:center; gap:2px; vertical-align:middle; }

        /* Schrijfruimte */
        .blank { display:inline-block; border-bottom:2px solid #555; min-width:clamp(50px,7vw,70px); height:clamp(15px,2.2vw,20px); vertical-align:middle; }

        .cmp { display:inline-flex; align-items:center; justify-content:center; border:1.5px solid #aaa; border-radius:3px; width:clamp(17px,2.3vw,21px); height:clamp(17px,2.3vw,21px); font-size:.75rem; font-weight:800; vertical-align:middle; color:#c02020; }
        .cmp.empty-cmp { color:transparent; }

        .pie-row { display:flex; align-items:center; gap:5px; }

        .ws-foot { margin-top:auto; padding-top:4px; font-size:clamp(.38rem,.65vw,.5rem); color:#ccc; text-align:center; flex-shrink:0; }

        @media print {
            * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
            @page { size:A4 portrait; margin:10mm 12mm; }
            body { background:white; }
            header, .sidebar, .page-label { display:none !important; }
            .app { display:block; padding:0; max-width:none; }
            .pages-wrap, .page-col { display:block; }
            .a4-page { aspect-ratio:auto; width:100%; height:277mm; overflow:visible; box-shadow:none; border-radius:0; padding:0; }
            #col-ws  { page-break-after:  always; }
            #col-ans { page-break-before: always; }
            .ws-title   { font-size:1.05rem !important; }
            .ws-sub     { font-size:.6rem  !important; }
            .ws-meta    { font-size:.61rem !important; }
            .ex-content { font-size:.74rem !important; }
            .ans-badge  { font-size:.58rem !important; }
            .ws-hint    { font-size:.6rem  !important; padding:2px 6px !important; margin-bottom:4px !important; }
            .ws-foot    { font-size:.5rem  !important; }
            .ex-cols    { gap:0 10px !important; }
            .ex-col     { gap:5px !important; }
            .ex-box     { padding:6px 7px 6px 21px !important; min-height:28px !important; }
            .blank      { min-width:62px !important; height:17px !important; border-bottom-width:2px !important; }
            .cmp        { width:19px !important; height:19px !important; }
            .ws-logo    { height:36px !important; }
        }
    </style>
</head>
<body>
<header>
    <div style="font-size:1.8rem">&#129518;</div>
    <div><h1>Breuken Werkbladgenerator</h1><p>Groep 7 &amp; 8 &middot; meesterdanny.com</p></div>
</header>

<div class="app">
    <div class="sidebar">
        <div class="card">
            <div class="card-title">&#128208; Opgave</div>
            <div class="fg">
                <label>Opgavetype</label>
                <select id="exType">
                    <option value="herkenning">Breukenherkenning</option>
                    <option value="vereenvoudigen">Breuken vereenvoudigen</option>
                    <option value="vergelijken">Breuken vergelijken</option>
                    <option value="optellen">Breuken optellen</option>
                    <option value="aftrekken">Breuken aftrekken</option>
                    <option value="optellen_aftrekken">Optellen en aftrekken (gemengd)</option>
                </select>
            </div>
            <div class="fg" id="noemers-row" style="display:none">
                <label>Noemers</label>
                <select id="noemers">
                    <option value="gelijk">Gelijke noemers</option>
                    <option value="ongelijk">Ongelijke noemers</option>
                </select>
            </div>
            <div class="fg">
                <label>Moeilijkheidsgraad</label>
                <select id="diff">
                    <option value="makkelijk">&#11088; Makkelijk</option>
                    <option value="gemiddeld" selected>&#11088;&#11088; Gemiddeld</option>
                    <option value="moeilijk">&#11088;&#11088;&#11088; Moeilijk</option>
                </select>
            </div>
            <div class="fg">
                <label>Aantal opgaven</label>
                <select id="num">
                    <option value="16">16 opgaven</option>
                    <option value="20" selected>20 opgaven</option>
                    <option value="24">24 opgaven</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="card-title">&#128196; Werkblad</div>
            <div class="fg"><label>Titel</label><input type="text" id="wsTitle" value="Breukenherkenning"></div>
            <div class="fg">
                <label>Naam leerling</label>
                <select id="nameOpt">
                    <option value="lijn">Invulregel tonen</option>
                    <option value="geen">Niet tonen</option>
                </select>
            </div>
            <div class="fg">
                <label>Datum</label>
                <select id="dateOpt">
                    <option value="lijn">Invulregel tonen</option>
                    <option value="vandaag">Datum van vandaag</option>
                    <option value="geen">Niet tonen</option>
                </select>
            </div>
        </div>

        <div class="card">
            <button class="btn btn-gen" onclick="generate()">&#127922; Genereer werkbladen</button>
            <button class="btn btn-prt" onclick="window.print()">&#128424; Afdrukken / PDF</button>
        </div>
    </div>

    <div class="pages-wrap">
        <div class="page-col" id="col-ws">
            <div class="page-label">Werkblad &#8212; pagina 1</div>
            <div class="a4-page" id="pg-ws">
                <div class="empty"><div class="ico">&#128196;</div><div>Klik op <strong>Genereer werkbladen</strong><br>om te beginnen</div></div>
            </div>
        </div>
        <div class="page-col" id="col-ans">
            <div class="page-label">Antwoordblad &#8212; pagina 2</div>
            <div class="a4-page" id="pg-ans">
                <div class="empty"><div class="ico">&#10003;</div><div>Het antwoordblad<br>verschijnt hier</div></div>
            </div>
        </div>
    </div>
</div>

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){var t=b;b=a%b;a=t;}return a||1;}
function lcm(a,b){return Math.abs(a*b)/gcd(a,b);}
function reduce(n,d){var g=gcd(Math.abs(n),Math.abs(d));return{n:n/g,d:d/g};}

function F(n,d){return '<span class="frac"><span class="t">'+n+'</span><span class="b">'+d+'</span></span>';}
function BLANK(){return '<span class="blank"></span>';}
function CMP(s){return '<span class="cmp'+(s?'':' empty-cmp')+'">'+(s||'?')+'</span>';}

/* Antwoord als gemengd getal: 13/10 wordt 1 3/10 */
function MIX(n,d){
    var r=reduce(n,d); n=r.n; d=r.d;
    if(n===0) return '<strong>0</strong>';
    if(d===1) return '<strong>'+n+'</strong>';
    if(n<d)   return F(n,d);
    var whole=Math.floor(n/d), rem=n%d;
    if(rem===0) return '<strong>'+whole+'</strong>';
    return '<span class="mix"><strong>'+whole+'</strong>'+F(rem,d)+'</span>';
}

function pie(n,d){
    var S=36,cx=S/2,cy=S/2,r=S/2-1.5;
    if(d===1)return '<svg width="'+S+'" height="'+S+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#3b82f6" stroke="#444" stroke-width="1.5"/></svg>';
    var p='';
    for(var i=0;i<d;i++){
        var a1=(i/d)*2*Math.PI-Math.PI/2,a2=((i+1)/d)*2*Math.PI-Math.PI/2;
        var x1=(cx+r*Math.cos(a1)).toFixed(2),y1=(cy+r*Math.sin(a1)).toFixed(2);
        var x2=(cx+r*Math.cos(a2)).toFixed(2),y2=(cy+r*Math.sin(a2)).toFixed(2);
        p+='<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+(a2-a1>Math.PI?1:0)+' 1 '+x2+','+y2+' Z" fill="'+(i<n?'#3b82f6':'#eef3ff')+'" stroke="#999" stroke-width="0.8"/>';
    }
    p+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#333" stroke-width="1.5"/>';
    return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 '+S+' '+S+'">'+p+'</svg>';
}

var DENS ={makkelijk:[2,3,4,5],gemiddeld:[2,3,4,5,6,8,10],moeilijk:[3,4,5,6,7,8,9,10,12]};
var PDENS={makkelijk:[2,3,4],gemiddeld:[2,3,4,5,6],moeilijk:[2,3,4,5,6,8]};
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pf(d){var den=pick(DENS[d]);return{n:rnd(1,den-1),d:den};}
function pfo(d){var a=pf(d),b=pf(d),t=0;while(a.d===b.d&&t++<15)b=pf(d);return{a:a,b:b};}

function genHerkenning(d){
    var den=pick(PDENS[d]),n=rnd(1,den-1);
    return{q:'<div class="pie-row">'+pie(n,den)+'<span style="margin-left:3px">= '+BLANK()+'</span></div>',
           a:'<div class="pie-row">'+pie(n,den)+'<span style="margin-left:3px">= '+F(n,den)+'</span></div>'};
}
function genVereenvoudigen(d){
    var bD=pick(DENS[d]),f=pick(d==='makkelijk'?[2,3]:d==='gemiddeld'?[2,3,4]:[2,3,4,5]);
    var n=rnd(1,bD-1)*f,den=bD*f,r=reduce(n,den);
    return{q:'Vereenvoudig: '+F(n,den)+' = '+BLANK(), a:F(n,den)+' = '+F(r.n,r.d)};
}
function genVergelijken(d,noe){
    var a,b;
    if(noe==='gelijk'){
        var den=pick(DENS[d]),n1=rnd(1,den-1),n2=rnd(1,den-1),t=0;
        while(n1===n2&&t++<10)n2=rnd(1,den-1);
        a={n:n1,d:den}; b={n:n2,d:den};
    }else{
        var p=pfo(d);a=p.a;b=p.b;var t=0;
        while(a.n*b.d===b.n*a.d&&t++<15)b=pfo(d).b;
    }
    var s=a.n/a.d>b.n/b.d?'>':(a.n/a.d<b.n/b.d?'<':'=');
    return{q:F(a.n,a.d)+' '+CMP(null)+' '+F(b.n,b.d), a:F(a.n,a.d)+' '+CMP(s)+' '+F(b.n,b.d)};
}
function genOptellen(d,noe){
    var a,b;
    if(noe==='gelijk'){var den=pick(DENS[d]);a={n:rnd(1,den-1),d:den};b={n:rnd(1,den-1),d:den};}
    else{var p=pfo(d);a=p.a;b=p.b;}
    var L=lcm(a.d,b.d),rn=a.n*(L/a.d)+b.n*(L/b.d);
    return{q:F(a.n,a.d)+' + '+F(b.n,b.d)+' = '+BLANK(), a:F(a.n,a.d)+' + '+F(b.n,b.d)+' = '+MIX(rn,L)};
}
function genAftrekken(d,noe){
    var a,b;
    if(noe==='gelijk'){
        var den=pick(DENS[d]),n1=rnd(1,den-1),n2=rnd(1,den-1);
        if(n1<n2){var t=n1;n1=n2;n2=t;}
        a={n:n1,d:den}; b={n:n2,d:den};
    }else{var p=pfo(d);a=p.a;b=p.b;}
    var L=lcm(a.d,b.d),an=a.n*(L/a.d),bn=b.n*(L/b.d);
    if(an<bn){var tmp=a;a=b;b=tmp;var tn=an;an=bn;bn=tn;}
    var rn=an-bn;
    return{q:F(a.n,a.d)+' \u2212 '+F(b.n,b.d)+' = '+BLANK(),
           a:F(a.n,a.d)+' \u2212 '+F(b.n,b.d)+' = '+(rn===0?'<strong>0</strong>':MIX(rn,L))};
}
function makeEx(type,diff,noe){
    switch(type){
        case 'herkenning':         return genHerkenning(diff);
        case 'vereenvoudigen':     return genVereenvoudigen(diff);
        case 'vergelijken':        return genVergelijken(diff,noe);
        case 'optellen':           return genOptellen(diff,noe);
        case 'aftrekken':          return genAftrekken(diff,noe);
        case 'optellen_aftrekken': return Math.random()>.5?genOptellen(diff,noe):genAftrekken(diff,noe);
    }
}

/* Render – linker kolom nummers 1…half, rechter kolom half+1…n */
function buildPage(exs,isAns,title,stars,nameOpt,dateOpt,hint){
    var nH='',dH='';
    if(nameOpt==='lijn') nH='<div>Naam:&nbsp;<span class="ws-line"></span></div>';
    if(dateOpt==='lijn')         dH='<div>Datum:&nbsp;<span class="ws-line"></span></div>';
    else if(dateOpt==='vandaag') dH='<div>Datum: '+new Date().toLocaleDateString('nl-NL')+'</div>';

    var h='<div class="ws">';
    h+='<div class="ws-head"><div class="ws-head-left"><img class="ws-logo" src="'+LOGO_SRC+'" alt="MeesterDanny.com"><div><div class="ws-title">'+title+'</div><div class="ws-sub">Groep 7 &amp; 8 &nbsp;&middot;&nbsp; '+stars+'</div></div></div><div class="ws-meta">'+nH+dH+'</div></div>';
    if(isAns) h+='<span class="ans-badge">&#128203; Antwoordblad</span>';
    if(hint)  h+='<div class="ws-hint">&#128221; '+hint+'</div>';

    var half=Math.ceil(exs.length/2);
    var col1=exs.slice(0,half), col2=exs.slice(half);

    h+='<div class="ex-cols"><div class="ex-col">';
    for(var i=0;i<col1.length;i++){
        h+='<div class="ex-box"><div class="ex-n">'+(i+1)+'</div><div class="ex-content">'+(isAns?col1[i].a:col1[i].q)+'</div></div>';
    }
    h+='</div><div class="ex-col">';
    for(var j=0;j<col2.length;j++){
        h+='<div class="ex-box"><div class="ex-n">'+(half+j+1)+'</div><div class="ex-content">'+(isAns?col2[j].a:col2[j].q)+'</div></div>';
    }
    h+='</div></div>';
    h+='<div class="ws-foot">meesterdanny.com &middot; Breuken Werkbladgenerator</div></div>';
    return h;
}

function generate(){
    var type=document.getElementById('exType').value;
    var diff=document.getElementById('diff').value;
    var num=parseInt(document.getElementById('num').value);
    var noe=document.getElementById('noemers').value;
    var title=document.getElementById('wsTitle').value.trim()||'Breuken';
    var nameOpt=document.getElementById('nameOpt').value;
    var dateOpt=document.getElementById('dateOpt').value;
    var stars={makkelijk:'Makkelijk',gemiddeld:'Gemiddeld',moeilijk:'Moeilijk'}[diff];
    var hint=TYPE_CONFIG[type].hint;
    var exs=[];
    for(var i=0;i<num;i++) exs.push(makeEx(type,diff,noe));
    document.getElementById('pg-ws').innerHTML =buildPage(exs,false,title,stars,nameOpt,dateOpt,hint);
    document.getElementById('pg-ans').innerHTML=buildPage(exs,true, title,stars,nameOpt,dateOpt,hint);
}

document.getElementById('exType').addEventListener('change',function(){
    var cfg=TYPE_CONFIG[this.value];
    document.getElementById('wsTitle').value=cfg.label;
    document.getElementById('noemers-row').style.display=cfg.noemers?'block':'none';
    var el=document.getElementById('num'), cur=parseInt(el.value);
    el.innerHTML=cfg.opts.map(function(v){return '<option value="'+v+'"'+(v===cfg.def?' selected':'')+'>'+v+' opgaven</option>';}).join('');
    if(cfg.opts.indexOf(cur)>=0) el.value=cur;
});
</script>
